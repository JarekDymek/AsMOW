services:
  - type: web
    name: mow-ai-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: LLM_PROVIDER
        value: gemini
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash-lite
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: CURRENT_INFO_IMAP_HOST
        value: imap.gmail.com
      - key: CURRENT_INFO_IMAP_PORT
        value: "993"
      - key: CURRENT_INFO_IMAP_SECURE
        value: "true"
      - key: CURRENT_INFO_FROM
        value: dgorski5@wp.pl
      - key: CURRENT_INFO_SINCE
        value: "2026-01-01"
      - key: CURRENT_INFO_IMAP_USER
        sync: false
      - key: CURRENT_INFO_IMAP_PASSWORD
        sync: false
      - key: CURRENT_INFO_SYNC_TOKEN
        sync: false
      - key: TEST_ACCESS_TOKENS
        sync: false
      - key: TEST_WEEKLY_BACKEND_URL
        sync: false
      - key: TEST_WEEKLY_VIEW_TOKEN
        sync: false
      - key: TEST_WEEKLY_EDUCATOR
        value: Dymek
